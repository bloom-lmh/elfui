name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CHROME_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Lightweight native Chromium integration
        run: pnpm verify:browser-smoke
      - name: Full Chromium integration matrix
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm verify:integrations:chromium
