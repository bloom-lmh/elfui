name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        default: beta
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Publish packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in shared reactivity runtime compiler-template compiler elfui vite-plugin; do
            cd "packages/$pkg"
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip existing $name@$version"
            else
              npm publish --provenance --access public --tag "${{ inputs.tag }}"
            fi
            cd ../..
          done
      - name: Read release version
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./packages/elfui/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists"
            exit 0
          fi

          args=("$TAG" --title "ElfUI $VERSION" --generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
